[tools]
bun = "1.3.13"

[tasks.dev]
description = "Run the MCP server over stdio"
run = "bun run dev"

[tasks.build]
description = "Compile TypeScript"
run = "bun run build"

[tasks.test]
description = "Run unit tests"
run = "bun run test"

[tasks.lint]
description = "Run ESLint and Prettier checks"
run = "bun run lint"

[tasks.typecheck]
description = "Type-check without emitting files"
run = "bun run typecheck"
