# Copy .env.example to .env and fill in strong credentials before starting.
# OWASP A02: never use the default dev/dev credentials in production.
#
#   cp .env.example .env
#   # edit .env with real values
#   docker compose up

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: "${PORT:-8080}"
      # OWASP A05: Swagger UI is disabled by default. Set to "true" in .env
      # only for local development or a dedicated staging environment.
      SWAGGER_ENABLED: "${SWAGGER_ENABLED:-false}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
